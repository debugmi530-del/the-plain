name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.4"
  EXPORT_NAME: "the-plain"
  KEYSTORE_PATH: "/home/runner/release.keystore"

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313"

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" \
            -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Godot export templates
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          mkdir -p "$TEMPLATE_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" \
            -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* "$TEMPLATE_DIR/"

      - name: Setup Godot Android editor settings
        run: |
          echo "=== Android SDK env vars ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ANDROID_SDK_PATH="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          echo "Using SDK path: $ANDROID_SDK_PATH"
          mkdir -p "$HOME/.config/godot"
          printf '[gd_resource type="EditorSettings" format=3]\n[resource]\nexport/android/android_sdk_path = "%s"\n' "$ANDROID_SDK_PATH" \
            > "$HOME/.config/godot/editor_settings-4.tres"
          echo "=== editor_settings-4.tres ==="
          cat "$HOME/.config/godot/editor_settings-4.tres"

      - name: Setup keystore (release)
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "${{ env.KEYSTORE_PATH }}"
          sed -i "s|keystore/release=.*|keystore/release=\"${{ env.KEYSTORE_PATH }}\"|g" export_presets.cfg
          sed -i "s|keystore/release_user=.*|keystore/release_user=\"${{ secrets.KEY_ALIAS }}\"|g" export_presets.cfg
          sed -i "s|keystore/release_password=.*|keystore/release_password=\"${{ secrets.KEY_PASSWORD }}\"|g" export_presets.cfg

      - name: Setup keystore (debug)
        if: env.HAS_KEYSTORE == 'false'
        run: |
          # Clear release keystore fields
          sed -i 's|keystore/release=.*|keystore/release=""|g' export_presets.cfg
          sed -i 's|keystore/release_user=.*|keystore/release_user=""|g' export_presets.cfg
          sed -i 's|keystore/release_password=.*|keystore/release_password=""|g' export_presets.cfg
          # Generate debug keystore
          mkdir -p "$HOME/.android"
          keytool -genkey -v \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true
          # Fix debug keystore path (was literal $HOME, now expanded)
          sed -i "s|keystore/debug=.*|keystore/debug=\"$HOME/.android/debug.keystore\"|g" export_presets.cfg
          sed -i "s|keystore/debug_user=.*|keystore/debug_user=\"androiddebugkey\"|g" export_presets.cfg
          sed -i "s|keystore/debug_password=.*|keystore/debug_password=\"android\"|g" export_presets.cfg
          echo "=== export_presets.cfg keystore section ==="
          grep "keystore/" export_presets.cfg

      - name: Import project
        run: |
          timeout 120 godot --headless --import 2>&1 || true

      - name: Build APK (debug)
        if: env.HAS_KEYSTORE == 'false'
        run: |
          mkdir -p build
          godot --headless --export-debug "Android" "build/${{ env.EXPORT_NAME }}-debug.apk" 2>&1
          echo "BUILD_FILE=build/${{ env.EXPORT_NAME }}-debug.apk" >> $GITHUB_ENV

      - name: Build APK (release, signed)
        if: env.HAS_KEYSTORE == 'true'
        run: |
          mkdir -p build
          godot --headless --export-release "Android" "build/${{ env.EXPORT_NAME }}.apk" 2>&1
          echo "BUILD_FILE=build/${{ env.EXPORT_NAME }}.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-apk
          path: build/*.apk
          if-no-files-found: warn

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Build #${{ github.run_number }}"
          body: |
            Автоматическая сборка из ветки `main`
            Коммит: ${{ github.sha }}
            Подписан: ${{ env.HAS_KEYSTORE == 'true' && 'да' || 'нет (debug)' }}
          files: build/*.apk
          generate_release_notes: false
