name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.4"
  EXPORT_NAME: "the-plain"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313"

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Godot export templates
        run: |
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          mkdir -p "$TEMPLATE_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* "$TEMPLATE_DIR/"

      - name: Setup Godot Android export
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" << 'EOF'
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          EOF

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$HOME/release.keystore"

      - name: Import project
        run: |
          cd ${{ github.workspace }}
          timeout 120 godot --headless --import 2>&1 || true

      - name: Build APK (debug - no keystore required)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: |
          mkdir -p build
          cd ${{ github.workspace }}
          godot --headless --export-debug "Android" "build/${{ env.EXPORT_NAME }}-debug.apk" 2>&1

      - name: Build APK (release - signed)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p build
          cd ${{ github.workspace }}
          godot --headless --export-release "Android" "build/${{ env.EXPORT_NAME }}.apk" 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-apk
          path: build/*.apk
          if-no-files-found: warn

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Build #${{ github.run_number }}"
          body: |
            Автоматическая сборка из ветки main
            Коммит: ${{ github.sha }}
          files: build/*.apk
          generate_release_notes: false
